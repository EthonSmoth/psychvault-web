<svg width="100%" viewBox="0 0 1210 550" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Common NDIS report pitfalls vs stronger approach – ASD</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Side-by-side comparison of weak and strong NDIS report language using ASD-specific examples.</desc>
<defs/>

<rect width="1200" height="540" fill="#f8fbff" style="fill:rgb(248, 251, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Column headers -->
<rect x="30" y="20" width="555" height="50" rx="8" fill="#fcebeb" stroke="#f09595" stroke-width="1.5" style="fill:rgb(252, 235, 235);stroke:rgb(240, 149, 149);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="307" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:18px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Common pitfalls</text>

<rect x="615" y="20" width="555" height="50" rx="8" fill="#eaf3de" stroke="#97c459" stroke-width="1.5" style="fill:rgb(234, 243, 222);stroke:rgb(151, 196, 89);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="892" y="51" text-anchor="middle" font-size="18" font-weight="700" fill="#173404" style="fill:rgb(23, 52, 4);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:18px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Stronger approach</text>

<!-- Centre divider -->
<line x1="600" y1="20" x2="600" y2="520" stroke="#d3d1c7" stroke-width="1" stroke-dasharray="5,4" style="fill:rgb(0, 0, 0);stroke:rgb(211, 209, 199);color:rgb(0, 0, 0);stroke-width:1px;stroke-dasharray:5px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Row 1 -->
<rect x="30" y="84" width="555" height="96" rx="6" fill="#ffffff" stroke="#f7c1c1" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(247, 193, 193);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="50" y="106" font-size="14" font-weight="700" fill="#a32d2d" style="fill:rgb(163, 45, 45);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Diagnosis without function</text>
<text x="50" y="128" font-size="13" fill="#501313" style="fill:rgb(80, 19, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"Has ASD and requires OT"</text>
<text x="50" y="150" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Leaves the planner with no basis to approve — a diagnosis alone</text>
<text x="50" y="168" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">does not describe what support is needed or why.</text>

<rect x="615" y="84" width="555" height="96" rx="6" fill="#ffffff" stroke="#c0dd97" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(192, 221, 151);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="635" y="106" font-size="14" font-weight="700" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Functional impact + support link</text>
<text x="635" y="128" font-size="13" fill="#173404" style="fill:rgb(23, 52, 4);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"ASD sensory difficulties limit community access; OT will..."</text>
<text x="635" y="150" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Names the specific functional limitation and connects it directly</text>
<text x="635" y="168" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">to the recommended support.</text>

<!-- Row 2 -->
<rect x="30" y="192" width="555" height="96" rx="6" fill="#ffffff" stroke="#f7c1c1" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(247, 193, 193);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="50" y="214" font-size="14" font-weight="700" fill="#a32d2d" style="fill:rgb(163, 45, 45);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Emotional framing</text>
<text x="50" y="236" font-size="13" fill="#501313" style="fill:rgb(80, 19, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"This child finds school overwhelming"</text>
<text x="50" y="258" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Planners need functional evidence, not emotional language.</text>
<text x="50" y="276" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Emotional framing does not satisfy the reasonable and necessary test.</text>

<rect x="615" y="192" width="555" height="96" rx="6" fill="#ffffff" stroke="#c0dd97" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(192, 221, 151);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="635" y="214" font-size="14" font-weight="700" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Functional evidence</text>
<text x="635" y="236" font-size="13" fill="#173404" style="fill:rgb(23, 52, 4);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"Attends school 2 days/week due to ASD meltdowns in shared spaces"</text>
<text x="635" y="258" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Quantified, observable, and directly tied to the disability's</text>
<text x="635" y="276" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">functional impact on participation.</text>

<!-- Row 3 -->
<rect x="30" y="300" width="555" height="96" rx="6" fill="#ffffff" stroke="#f7c1c1" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(247, 193, 193);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="50" y="322" font-size="14" font-weight="700" fill="#a32d2d" style="fill:rgb(163, 45, 45);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Generic volume</text>
<text x="50" y="344" font-size="13" fill="#501313" style="fill:rgb(80, 19, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"Recommends speech pathology"</text>
<text x="50" y="366" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">No frequency, duration, or goals — leaves too much</text>
<text x="50" y="384" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">room for a planner to reject or underfund the request.</text>

<rect x="615" y="300" width="555" height="96" rx="6" fill="#ffffff" stroke="#c0dd97" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(192, 221, 151);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="635" y="322" font-size="14" font-weight="700" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Justified volume + goals</text>
<text x="635" y="344" font-size="13" fill="#173404" style="fill:rgb(23, 52, 4);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"Fortnightly SP for 12 months to address ASD social communication barriers"</text>
<text x="635" y="366" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Specifies type, frequency, duration, and the functional</text>
<text x="635" y="384" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">goal — easy to approve.</text>

<!-- Row 4 -->
<rect x="30" y="408" width="555" height="80" rx="6" fill="#ffffff" stroke="#f7c1c1" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(247, 193, 193);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="50" y="430" font-size="14" font-weight="700" fill="#a32d2d" style="fill:rgb(163, 45, 45);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">No outcomes stated</text>
<text x="50" y="452" font-size="13" fill="#501313" style="fill:rgb(80, 19, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">Lists ASD traits without stating expected results</text>
<text x="50" y="472" font-size="12" fill="#791f1f" style="fill:rgb(121, 31, 31);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">NDIS planning is outcomes-focused — problems without goals are harder to approve.</text>

<rect x="615" y="408" width="555" height="80" rx="6" fill="#ffffff" stroke="#c0dd97" stroke-width="1" style="fill:rgb(255, 255, 255);stroke:rgb(192, 221, 151);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="635" y="430" font-size="14" font-weight="700" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:14px;font-weight:700;text-anchor:start;dominant-baseline:auto">Measurable outcomes</text>
<text x="635" y="452" font-size="13" fill="#173404" style="fill:rgb(23, 52, 4);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">"Attend school 4 days/week; reduce meltdown frequency by 50%"</text>
<text x="635" y="472" font-size="12" fill="#27500a" style="fill:rgb(39, 80, 10);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:system-ui, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:auto">Gives the planner a concrete outcome to approve funding toward.</text>
</svg>